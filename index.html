<title>PH Power — Registro de Entrenamiento</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#15140f">
<style>
  :root {
    --bg: #f3efe4;
    --surface: #ffffff;
    --surface-2: #ece5d3;
    --border: #ddd3ba;
    --ink: #201d16;
    --ink-dim: #6b6252;
    --accent: #b5391f;
    --accent-ink: #ffffff;
    --pr: #93690f;
    --pr-soft: #f1e2b8;
    --good: #43663a;
    --good-soft: #dfe9d5;
    --bad: #a8341f;
    --shadow: 0 1px 2px rgba(32,29,22,.06), 0 4px 14px rgba(32,29,22,.06);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15140f;
      --surface: #201e17;
      --surface-2: #2a271d;
      --border: #3a362a;
      --ink: #ece5d2;
      --ink-dim: #9c927b;
      --accent: #e0532f;
      --accent-ink: #1a0d08;
      --pr: #d8ac3d;
      --pr-soft: #3a2f13;
      --good: #8fbf7c;
      --good-soft: #24301e;
      --bad: #e0684f;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="dark"] {
    --bg: #15140f; --surface: #201e17; --surface-2: #2a271d; --border: #3a362a;
    --ink: #ece5d2; --ink-dim: #9c927b; --accent: #e0532f; --accent-ink: #1a0d08;
    --pr: #d8ac3d; --pr-soft: #3a2f13; --good: #8fbf7c; --good-soft: #24301e; --bad: #e0684f;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
  }
  :root[data-theme="light"] {
    --bg: #f3efe4; --surface: #ffffff; --surface-2: #ece5d3; --border: #ddd3ba;
    --ink: #201d16; --ink-dim: #6b6252; --accent: #b5391f; --accent-ink: #ffffff;
    --pr: #93690f; --pr-soft: #f1e2b8; --good: #43663a; --good-soft: #dfe9d5; --bad: #a8341f;
    --shadow: 0 1px 2px rgba(32,29,22,.06), 0 4px 14px rgba(32,29,22,.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  #app { width: 100%; max-width: 560px; padding-bottom: calc(88px + env(safe-area-inset-bottom)); }

  .num, input[type="number"] { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

  header.top {
    padding: 22px 20px 14px;
    display: flex; flex-direction: column; gap: 2px;
  }
  header.top .kicker {
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-dim); font-weight: 700;
  }
  header.top h1 {
    margin: 0;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: -.01em;
    text-wrap: balance;
    transform: scaleX(.86);
    transform-origin: left;
  }
  header.top h1 span { color: var(--accent); }

  nav.days {
    display: flex; gap: 8px; padding: 0 20px 16px;
    overflow-x: auto;
  }
  nav.days button {
    flex: none;
    font: inherit; font-weight: 700; font-size: 13px;
    padding: 9px 14px; border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--ink-dim);
    cursor: pointer;
  }
  nav.days button .tag {
    display: block; font-size: 9px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; opacity: .7; margin-top: 1px;
  }
  nav.days button.active {
    background: var(--ink); color: var(--bg); border-color: var(--ink);
  }
  :root[data-theme="dark"] nav.days button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  @media (prefers-color-scheme: dark) { nav.days button.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); } }

  main { padding: 4px 16px 24px; display: flex; flex-direction: column; gap: 14px; }

  .day-note {
    font-size: 13px; color: var(--ink-dim); padding: 2px 4px 6px;
    display: flex; align-items: center; gap: 6px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 10px; padding: 14px 16px 10px;
  }
  .card-head h2 {
    margin: 0; font-size: 17px; font-weight: 750; text-wrap: balance;
    letter-spacing: -.005em;
    transform: scaleX(.92); transform-origin: left;
  }
  .scheme {
    font-size: 12px; font-weight: 700; color: var(--ink-dim);
    white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .rest-chip {
    font-size: 10.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--ink-dim); padding: 0 16px 8px; margin-top: -4px;
  }
  .suggest {
    margin: 0 16px 10px; padding: 7px 10px; border-radius: 9px;
    font-size: 12.5px; font-weight: 600;
    background: var(--pr-soft); color: var(--pr);
    display: flex; align-items: center; gap: 6px;
  }

  .sets { display: flex; flex-direction: column; }
  .set-row {
    display: grid;
    grid-template-columns: 44px 1fr 1fr 44px;
    gap: 8px;
    align-items: center;
    padding: 7px 16px;
    border-top: 1px solid var(--border);
  }
  .set-row .label { font-size: 12px; font-weight: 700; color: var(--ink-dim); }
  .set-row input {
    width: 100%; font: inherit; font-size: 15px; font-weight: 700;
    color: var(--ink); background: var(--surface-2);
    border: 1.5px solid transparent; border-radius: 9px;
    padding: 9px 8px; text-align: center;
  }
  .set-row input::placeholder { color: var(--ink-dim); font-weight: 500; opacity: .6; }
  .set-row input:focus-visible { outline: none; border-color: var(--accent); }
  .set-row .check {
    width: 40px; height: 40px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--surface-2); color: var(--ink-dim);
    font-size: 17px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .set-row .check:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .set-row.done { background: var(--good-soft); }
  .set-row.done .check { background: var(--good); border-color: var(--good); color: var(--good-soft); }
  .set-row.done input { background: transparent; }
  .set-row.done.under { background: var(--pr-soft); }
  .set-row.done.under .check { background: var(--pr); border-color: var(--pr); color: var(--pr-soft); }

  .counter {
    font-size: 11px; font-weight: 700; color: var(--ink-dim);
    background: var(--surface-2); padding: 3px 8px; border-radius: 999px;
    white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .counter.full { background: var(--good-soft); color: var(--good); }

  .note-wrap { padding: 2px 16px 12px; }
  .note-input {
    width: 100%; font: inherit; font-size: 12.5px; color: var(--ink-dim);
    background: var(--surface-2); border: 1px solid transparent; border-radius: 9px;
    padding: 8px 10px; resize: none; min-height: 34px; line-height: 1.35;
  }
  .note-input:focus-visible { outline: none; border-color: var(--accent); color: var(--ink); }
  .note-input::placeholder { color: var(--ink-dim); opacity: .6; }

  .cardio-row {
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .cardio-row p { margin: 0; font-size: 13.5px; color: var(--ink-dim); }
  .cardio-row button {
    flex: none; font: inherit; font-weight: 700; font-size: 13px;
    padding: 9px 14px; border-radius: 9px; border: 1.5px solid var(--border);
    background: var(--surface-2); color: var(--ink); cursor: pointer;
  }
  .cardio-row button.done { background: var(--good-soft); color: var(--good); border-color: var(--good); }

  .finish {
    margin: 6px 4px 0;
    padding: 15px; border-radius: var(--radius); border: none;
    background: var(--accent); color: var(--accent-ink);
    font: inherit; font-weight: 800; font-size: 15px; letter-spacing: .01em;
    cursor: pointer;
  }
  .finish:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  .finish[disabled] { opacity: .45; }

  /* Rest timer sheet */
  #timer {
    position: fixed; left: 0; right: 0; bottom: calc(64px + env(safe-area-inset-bottom));
    display: none; justify-content: center; z-index: 20;
    padding: 0 16px;
  }
  #timer.show { display: flex; }
  #timer .box {
    width: 100%; max-width: 528px;
    background: var(--ink); color: var(--bg);
    border-radius: 16px; box-shadow: var(--shadow);
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  #timer .clock {
    font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; min-width: 64px;
  }
  #timer .exname { font-size: 12px; opacity: .7; flex: 1; }
  #timer button {
    font: inherit; font-weight: 700; font-size: 12px; border: none; cursor: pointer;
    background: rgba(255,255,255,.12); color: inherit; padding: 8px 12px; border-radius: 9px;
  }
  @media (prefers-reduced-motion: no-preference) {
    #timer.show .clock.pulse { animation: pulse 1s ease-in-out infinite; }
  }
  @keyframes pulse { 50% { opacity: .55; } }

  /* Bottom nav */
  nav.bottom {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    display: flex; background: var(--surface); border-top: 1px solid var(--border);
    padding: 6px 10px calc(6px + env(safe-area-inset-bottom));
  }
  nav.bottom button {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    font: inherit; background: none; border: none; cursor: pointer;
    padding: 6px 4px; color: var(--ink-dim); font-size: 11px; font-weight: 700;
  }
  nav.bottom button .ico { font-size: 19px; }
  nav.bottom button.active { color: var(--accent); }

  /* Progress view */
  .prog-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 16px;
  }
  .prog-item h3 {
    margin: 0 0 2px; font-size: 15.5px; font-weight: 750;
    transform: scaleX(.92); transform-origin: left;
  }
  .prog-item .best {
    font-size: 12px; color: var(--ink-dim); margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
  }
  .prog-item canvas { display: block; width: 100%; height: 44px; }
  .prog-empty { text-align: center; color: var(--ink-dim); font-size: 13px; padding: 40px 20px; }

  .section-label {
    font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
    color: var(--ink-dim); padding: 10px 4px 0;
  }

  /* Settings view */
  .settings-day { display: flex; flex-direction: column; gap: 8px; }
  .ex-row {
    display: grid;
    grid-template-columns: 1fr 46px 76px 62px 44px;
    gap: 6px; align-items: center;
    padding: 8px 0; border-top: 1px solid var(--border);
  }
  .ex-row:first-child { border-top: none; }
  .ex-row input {
    width: 100%; font: inherit; font-size: 12.5px; font-weight: 600;
    color: var(--ink); background: var(--surface-2);
    border: 1.5px solid transparent; border-radius: 8px;
    padding: 7px 6px; text-align: center;
  }
  .ex-row input.ex-name { text-align: left; font-weight: 700; }
  .ex-row input:focus-visible { outline: none; border-color: var(--accent); }
  .ex-row .del {
    width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--surface-2); color: var(--bad); font-weight: 800; cursor: pointer;
  }
  .ex-add {
    margin-top: 6px; padding: 10px; border-radius: 9px; border: 1.5px dashed var(--border);
    background: transparent; color: var(--ink-dim); font: inherit; font-weight: 700; font-size: 13px;
    cursor: pointer; width: 100%;
  }
  .field-hint { font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .05em; padding: 0 0 2px; }
  .hints-row { display: grid; grid-template-columns: 1fr 46px 76px 62px 44px; gap: 6px; }

  .btn-outline {
    font: inherit; font-weight: 700; font-size: 13.5px; cursor: pointer;
    padding: 12px; border-radius: 11px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--ink); width: 100%;
  }
  .btn-danger { color: var(--bad); }
  .file-label { display: block; }
  .file-label input[type="file"] { display: none; }

  .toast {
    position: fixed; left: 50%; bottom: calc(78px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(8px);
    background: var(--ink); color: var(--bg); font-weight: 700; font-size: 13px;
    padding: 10px 16px; border-radius: 999px; box-shadow: var(--shadow);
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
    z-index: 30; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

<div id="app"></div>
<div id="timer">
  <div class="box">
    <div class="clock num" id="timer-clock">2:00</div>
    <div class="exname" id="timer-name">Descanso</div>
    <button id="timer-skip">Saltar</button>
  </div>
</div>
<nav class="bottom">
  <button id="nav-train" class="active"><span class="ico">🏋️</span>Entrenar</button>
  <button id="nav-progress"><span class="ico">📈</span>Progreso</button>
  <button id="nav-settings"><span class="ico">⚙️</span>Ajustes</button>
</nav>
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  var DEFAULT_ROUTINE = [
    { id: "d1", name: "Pecho + Hombro + Tríceps", short: "Día 1", optional: false, cardio: null,
      exercises: [
        { n: "Press de banca con barra", sets: 5, label: "5×5", target: 5, rest: 120 },
        { n: "Press inclinado con mancuernas", sets: 4, label: "4×8-10", target: 10, rest: 90 },
        { n: "Fondos", sets: 4, label: "4×8-12", target: 12, rest: 90 },
        { n: "Press militar", sets: 4, label: "4×6-8", target: 8, rest: 120 },
        { n: "Elevaciones laterales", sets: 4, label: "4×15", target: 15, rest: 60 },
        { n: "Extensión de tríceps en polea", sets: 3, label: "3×12", target: 12, rest: 60 },
        { n: "Abdominales", sets: 3, label: "3 series", target: null, rest: 45 }
      ]},
    { id: "d2", name: "Espalda + Bíceps", short: "Día 2", optional: false, cardio: "Caminata inclinada — 10 min",
      exercises: [
        { n: "Peso muerto", sets: 4, label: "4×5", target: 5, rest: 150 },
        { n: "Dominadas", sets: 4, label: "4 al fallo", target: null, rest: 90 },
        { n: "Remo con barra", sets: 4, label: "4×8", target: 8, rest: 120 },
        { n: "Jalón al pecho", sets: 3, label: "3×10", target: 10, rest: 75 },
        { n: "Remo sentado", sets: 3, label: "3×12", target: 12, rest: 75 },
        { n: "Curl con barra", sets: 4, label: "4×8", target: 8, rest: 60 },
        { n: "Curl martillo", sets: 3, label: "3×12", target: 12, rest: 60 }
      ]},
    { id: "d3", name: "Piernas", short: "Día 3", optional: false, cardio: null,
      exercises: [
        { n: "Sentadilla libre", sets: 5, label: "5×5", target: 5, rest: 150 },
        { n: "Prensa", sets: 4, label: "4×10", target: 10, rest: 120 },
        { n: "Peso muerto rumano", sets: 4, label: "4×8", target: 8, rest: 120 },
        { n: "Hip Thrust", sets: 4, label: "4×10", target: 10, rest: 90 },
        { n: "Curl femoral", sets: 3, label: "3×12", target: 12, rest: 60 },
        { n: "Pantorrillas", sets: 5, label: "5×15", target: 15, rest: 45 },
        { n: "Crunch con peso", sets: 4, label: "4×15", target: 15, rest: 45 }
      ]},
    { id: "d4", name: "Upper Power", short: "Día 4", optional: true, cardio: null,
      exercises: [
        { n: "Press banca inclinado", sets: 4, label: "4×6", target: 6, rest: 120 },
        { n: "Dominadas lastradas o jalón pesado", sets: 4, label: "4×8", target: 8, rest: 120 },
        { n: "Press militar", sets: 4, label: "4×8", target: 8, rest: 120 },
        { n: "Remo T", sets: 4, label: "4×10", target: 10, rest: 90 },
        { n: "Curl barra EZ", sets: 3, label: "3×10", target: 10, rest: 60 },
        { n: "Fondos", sets: 3, label: "3 al fallo", target: null, rest: 90 },
        { n: "Face Pull", sets: 3, label: "3×15", target: 15, rest: 45 }
      ]}
  ];

  var ROUTINE_KEY = "phpower-routine-v1";
  var STORE_KEY = "phpower-log-v1";
  var DRAFT_KEY = "phpower-draft-v1";
  var NOTES_KEY = "phpower-notes-v1";
  var LASTDAY_KEY = "phpower-lastday-v1";

  function loadJSON(key, fallback) {
    try { var v = JSON.parse(localStorage.getItem(key)); return v == null ? fallback : v; }
    catch (e) { return fallback; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  function loadRoutine() {
    var custom = loadJSON(ROUTINE_KEY, null);
    return custom || JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
  }

  var routine = loadRoutine();
  var log = loadJSON(STORE_KEY, {});
  var draft = loadJSON(DRAFT_KEY, {});
  var notes = loadJSON(NOTES_KEY, {});
  var lastDay = loadJSON(LASTDAY_KEY, null);

  function suggestedDayId() {
    if (!lastDay) return routine[0].id;
    var idx = routine.findIndex(function (d) { return d.id === lastDay.dayId; });
    if (idx === -1) return routine[0].id;
    return routine[(idx + 1) % routine.length].id;
  }

  var activeDay = suggestedDayId();
  var suggestedId = activeDay;
  var activeView = "train";

  function lastSession(exName) {
    var h = log[exName];
    if (!h || !h.sessions || !h.sessions.length) return null;
    return h.sessions[h.sessions.length - 1];
  }

  function suggestedWeight(ex) {
    var last = lastSession(ex.n);
    if (!last) return null;
    var maxWeight = 0, allMet = true, any = false;
    last.sets.forEach(function (s) {
      if (s.weight == null) return;
      any = true;
      maxWeight = Math.max(maxWeight, s.weight);
      if (ex.target != null && (s.reps == null || s.reps < ex.target)) allMet = false;
      if (ex.target == null) allMet = false; // al fallo / series: no auto-bump
    });
    if (!any) return null;
    return { weight: maxWeight, bump: allMet };
  }

  function draftFor(exName) {
    if (!draft[exName]) draft[exName] = {};
    return draft[exName];
  }

  function fmtClock(sec) {
    var m = Math.floor(sec / 60), s = sec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  // ---- rest timer ----
  var timerEl = document.getElementById("timer");
  var clockEl = document.getElementById("timer-clock");
  var nameEl = document.getElementById("timer-name");
  var timerHandle = null, timerRemaining = 0;

  function startTimer(seconds, label) {
    clearInterval(timerHandle);
    timerRemaining = seconds;
    nameEl.textContent = label;
    clockEl.textContent = fmtClock(timerRemaining);
    clockEl.classList.remove("pulse");
    timerEl.classList.add("show");
    timerHandle = setInterval(function () {
      timerRemaining--;
      if (timerRemaining <= 0) {
        clearInterval(timerHandle);
        clockEl.textContent = "0:00";
        clockEl.classList.add("pulse");
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        setTimeout(function () { timerEl.classList.remove("show"); }, 1400);
        return;
      }
      clockEl.textContent = fmtClock(timerRemaining);
    }, 1000);
  }
  document.getElementById("timer-skip").addEventListener("click", function () {
    clearInterval(timerHandle);
    timerEl.classList.remove("show");
  });

  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 1800);
  }

  // ---- rendering ----
  var app = document.getElementById("app");

  function render() {
    if (activeView === "train") renderTrain();
    else if (activeView === "progress") renderProgress();
    else renderSettings();
  }

  function escapeAttr(s) { return String(s).replace(/"/g, "&quot;"); }
  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function renderTrain() {
    var day = routine.filter(function (d) { return d.id === activeDay; })[0];
    if (!day) { day = routine[0]; activeDay = day.id; }
    var html = "";

    html += '<header class="top"><div class="kicker">Registro de hoy</div>';
    html += '<h1>PH <span>POWER</span></h1></header>';

    html += '<nav class="days">';
    routine.forEach(function (d) {
      var tag = d.id === suggestedId ? '<span class="tag">Siguiente</span>' : (d.optional ? '<span class="tag">Opcional</span>' : "");
      html += '<button data-day="' + d.id + '" class="' + (d.id === activeDay ? "active" : "") + '">' +
        d.short + tag + '</button>';
    });
    html += '</nav>';

    html += '<main>';
    html += '<div class="day-note">' + escapeHtml(day.name) + '</div>';

    day.exercises.forEach(function (ex) {
      var dr = draftFor(ex.n);
      if (!dr.sets) dr.sets = [];
      var sugg = suggestedWeight(ex);

      var doneCount = dr.sets.filter(function (s) { return s && s.done; }).length;
      html += '<section class="card" data-ex="' + escapeAttr(ex.n) + '">';
      html += '<div class="card-head"><h2>' + escapeHtml(ex.n) + '</h2><span class="scheme num">' + escapeHtml(ex.label) + '</span></div>';
      html += '<div class="rest-chip">Descanso ' + ex.rest + 's &nbsp;·&nbsp; <span class="counter' +
        (doneCount === ex.sets ? ' full' : '') + '">' + doneCount + '/' + ex.sets + ' series</span></div>';

      if (sugg) {
        html += '<div class="suggest">' +
          (sugg.bump ? "⬆ Sugerido " + (sugg.weight + 5) + " lb (+5 — completaste todo la vez pasada)"
                     : "Sugerido " + sugg.weight + " lb (igual que la vez pasada)") +
          '</div>';
      }

      html += '<div class="sets">';
      for (var i = 0; i < ex.sets; i++) {
        var row = dr.sets[i] || {};
        var placeholderW = sugg ? (sugg.bump ? sugg.weight + 5 : sugg.weight) : "";
        var rowUnder = row.done && ex.target != null && row.reps != null && row.reps < ex.target;
        html += '<div class="set-row ' + (row.done ? "done" : "") + (rowUnder ? " under" : "") + '" data-set="' + i + '">';
        html += '<div class="label">S' + (i + 1) + '</div>';
        html += '<input class="w-input" inputmode="decimal" type="number" step="2.5" placeholder="' +
          (placeholderW !== "" ? placeholderW : "lb") + '" value="' + (row.weight != null ? row.weight : "") + '">';
        html += '<input class="r-input" inputmode="numeric" type="number" placeholder="' +
          (ex.target != null ? ex.target : "reps") + '" value="' + (row.reps != null ? row.reps : "") + '">';
        html += '<button class="check" aria-label="Marcar serie completa">' + (row.done ? "✓" : "") + '</button>';
        html += '</div>';
      }
      html += '</div>';
      html += '<div class="note-wrap"><textarea class="note-input" data-note="' + escapeAttr(ex.n) +
        '" placeholder="Nota (técnica, dolor, ajustes)…">' + escapeHtml(notes[ex.n] || "") + '</textarea></div>';
      html += '</section>';
    });

    if (day.cardio) {
      html += '<section class="card"><div class="cardio-row"><p>🚶 ' + escapeHtml(day.cardio) + '</p>' +
        '<button id="cardio-btn" class="' + (dr_cardio() ? "done" : "") + '">' + (dr_cardio() ? "Hecho ✓" : "Marcar") + '</button></div></section>';
    } else {
      html += '<div class="day-note">Cardio: 10–15 min al final</div>';
    }

    html += '<button class="finish" id="finish-btn">Terminar sesión de ' + day.short + '</button>';
    html += '</main>';

    app.innerHTML = html;
    wireTrainEvents(day);

    function dr_cardio() { return !!draft.__cardio_ && draft.__cardio_[day.id]; }
  }

  function updateCounter(card, day, exName) {
    var ex = null;
    day.exercises.forEach(function (e) { if (e.n === exName) ex = e; });
    if (!ex) return;
    var dr = draftFor(exName);
    var doneCount = (dr.sets || []).filter(function (s) { return s && s.done; }).length;
    var el = card.querySelector(".counter");
    if (!el) return;
    el.textContent = doneCount + "/" + ex.sets + " series";
    el.classList.toggle("full", doneCount === ex.sets);
  }

  function wireTrainEvents(day) {
    app.querySelectorAll("nav.days button").forEach(function (b) {
      b.addEventListener("click", function () { activeDay = b.getAttribute("data-day"); render(); });
    });

    app.querySelectorAll(".note-input").forEach(function (ta) {
      ta.addEventListener("input", function () {
        notes[ta.getAttribute("data-note")] = ta.value;
        save(NOTES_KEY, notes);
      });
    });

    app.querySelectorAll(".card").forEach(function (card) {
      var exName = card.getAttribute("data-ex");
      if (!exName) return;
      var dr = draftFor(exName);

      card.querySelectorAll(".set-row").forEach(function (row) {
        var idx = parseInt(row.getAttribute("data-set"), 10);
        var wInput = row.querySelector(".w-input");
        var rInput = row.querySelector(".r-input");
        var check = row.querySelector(".check");

        function ensure() { if (!dr.sets[idx]) dr.sets[idx] = {}; return dr.sets[idx]; }

        wInput.addEventListener("input", function () {
          ensure().weight = wInput.value === "" ? null : parseFloat(wInput.value);
          save(DRAFT_KEY, draft);
        });
        rInput.addEventListener("input", function () {
          var s = ensure();
          s.reps = rInput.value === "" ? null : parseInt(rInput.value, 10);
          save(DRAFT_KEY, draft);
          if (s.done) {
            var ex = null;
            day.exercises.forEach(function (e) { if (e.n === exName) ex = e; });
            var under = ex && ex.target != null && s.reps != null && s.reps < ex.target;
            row.classList.toggle("under", !!under);
          }
        });
        check.addEventListener("click", function () {
          var s = ensure();
          var ex = null;
          day.exercises.forEach(function (e) { if (e.n === exName) ex = e; });
          s.done = !s.done;
          if (s.done) {
            // Un toque sin escribir: asume el objetivo de la rutina (reps) y
            // el peso sugerido, si estaban vacios — evita re-escribir "5"
            // cinco veces en un 5x5 cuando se cumple el plan tal cual.
            if (s.reps == null && ex && ex.target != null) { s.reps = ex.target; rInput.value = ex.target; }
            if (s.weight == null && wInput.placeholder && wInput.placeholder !== "lb") {
              s.weight = parseFloat(wInput.placeholder); wInput.value = wInput.placeholder;
            }
          }
          save(DRAFT_KEY, draft);
          var under = s.done && ex && ex.target != null && s.reps != null && s.reps < ex.target;
          if (s.done) {
            row.classList.add("done");
            row.classList.toggle("under", !!under);
            check.textContent = "✓";
            if (ex) startTimer(ex.rest, exName);
          } else {
            row.classList.remove("done", "under");
            check.textContent = "";
          }
          updateCounter(card, day, exName);
        });
      });
    });

    var cardioBtn = document.getElementById("cardio-btn");
    if (cardioBtn) {
      cardioBtn.addEventListener("click", function () {
        if (!draft.__cardio_) draft.__cardio_ = {};
        draft.__cardio_[day.id] = !draft.__cardio_[day.id];
        save(DRAFT_KEY, draft);
        render();
      });
    }

    document.getElementById("finish-btn").addEventListener("click", function () {
      finishSession(day);
    });
  }

  function finishSession(day) {
    var today = new Date().toISOString().slice(0, 10);
    var savedAny = false;
    day.exercises.forEach(function (ex) {
      var dr = draftFor(ex.n);
      var sets = (dr.sets || []).filter(function (s) { return s && (s.weight != null || s.reps != null); });
      if (!sets.length) return;
      savedAny = true;
      if (!log[ex.n]) log[ex.n] = { sessions: [] };
      log[ex.n].sessions.push({
        date: today,
        sets: sets.map(function (s) { return { weight: s.weight, reps: s.reps }; })
      });
      delete draft[ex.n];
    });
    save(STORE_KEY, log);
    save(DRAFT_KEY, draft);
    lastDay = { dayId: day.id, date: today };
    save(LASTDAY_KEY, lastDay);
    suggestedId = suggestedDayId();
    if (savedAny) toast("Sesión guardada — " + day.short);
    else toast("No había series registradas");
    render();
  }

  // ---- progress view ----
  function allExercises() {
    var seen = {}, out = [];
    routine.forEach(function (d) {
      d.exercises.forEach(function (ex) {
        if (seen[ex.n]) return;
        seen[ex.n] = true;
        out.push(ex);
      });
    });
    return out;
  }

  function renderProgress() {
    var html = '<header class="top"><div class="kicker">Historial</div><h1>TU <span>PROGRESO</span></h1></header>';
    html += '<main>';
    var exs = allExercises();
    var any = false;
    exs.forEach(function (ex) {
      var h = log[ex.n];
      if (!h || !h.sessions.length) return;
      any = true;
      var sessions = h.sessions.slice(-8);
      var maxes = sessions.map(function (s) {
        return s.sets.reduce(function (m, x) { return Math.max(m, x.weight || 0); }, 0);
      });
      var best = Math.max.apply(null, maxes);
      var last = sessions[sessions.length - 1];
      html += '<div class="prog-item"><h3>' + escapeHtml(ex.n) + '</h3>' +
        '<div class="best num">Mejor: ' + best + ' lb &nbsp;·&nbsp; Última: ' + last.date + '</div>' +
        '<canvas data-values="' + maxes.join(",") + '" width="300" height="44"></canvas></div>';
    });
    if (!any) html += '<div class="prog-empty">Aún no hay sesiones guardadas.<br>Registra tu primer entrenamiento en <b>Entrenar</b>.</div>';
    html += '</main>';
    app.innerHTML = html;
    app.querySelectorAll("canvas[data-values]").forEach(drawSpark);
  }

  function drawSpark(canvas) {
    var values = canvas.getAttribute("data-values").split(",").map(Number);
    var ctx = canvas.getContext("2d");
    var w = canvas.width, h = canvas.height, pad = 6;
    var min = Math.min.apply(null, values), max = Math.max.apply(null, values);
    if (min === max) { min -= 5; max += 5; }
    var styles = getComputedStyle(document.documentElement);
    var accent = styles.getPropertyValue("--accent").trim();
    var border = styles.getPropertyValue("--border").trim();

    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = border; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, h - pad); ctx.lineTo(w, h - pad); ctx.stroke();

    var pts = values.map(function (v, i) {
      var x = pad + (i / (values.length - 1 || 1)) * (w - pad * 2);
      var y = h - pad - ((v - min) / (max - min)) * (h - pad * 2);
      return [x, y];
    });

    ctx.beginPath();
    pts.forEach(function (p, i) { i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]); });
    ctx.lineTo(pts[pts.length - 1][0], h - pad); ctx.lineTo(pts[0][0], h - pad); ctx.closePath();
    ctx.fillStyle = accent + "22"; ctx.fill();

    ctx.beginPath();
    pts.forEach(function (p, i) { i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]); });
    ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.lineJoin = "round"; ctx.stroke();

    var last = pts[pts.length - 1];
    ctx.beginPath(); ctx.arc(last[0], last[1], 3, 0, Math.PI * 2);
    ctx.fillStyle = accent; ctx.fill();
  }

  // ---- settings view ----
  function renderSettings() {
    var html = '<header class="top"><div class="kicker">Personalizar</div><h1>AJUSTES</h1></header>';
    html += '<main>';

    routine.forEach(function (day) {
      html += '<div class="section-label">' + day.short + ' — ' + escapeHtml(day.name) + '</div>';
      html += '<div class="card" style="padding:12px 16px;"><div class="hints-row">' +
        '<span class="field-hint">Ejercicio</span><span class="field-hint">Series</span>' +
        '<span class="field-hint">Etiqueta</span><span class="field-hint">Descanso</span><span></span></div>';
      html += '<div class="settings-day" data-day="' + day.id + '">';
      day.exercises.forEach(function (ex, i) {
        html += '<div class="ex-row" data-idx="' + i + '">' +
          '<input class="ex-name" data-f="n" value="' + escapeAttr(ex.n) + '">' +
          '<input data-f="sets" type="number" min="1" value="' + ex.sets + '">' +
          '<input data-f="label" value="' + escapeAttr(ex.label) + '">' +
          '<input data-f="rest" type="number" min="0" step="5" value="' + ex.rest + '">' +
          '<button class="del" data-idx="' + i + '" aria-label="Eliminar ejercicio">✕</button>' +
          '</div>';
      });
      html += '</div>';
      html += '<button class="ex-add" data-day="' + day.id + '">+ Agregar ejercicio</button>';
      html += '</div>';
    });

    html += '<div class="section-label">Rutina</div>';
    html += '<button class="btn-outline btn-danger" id="restore-btn">Restaurar rutina original</button>';

    html += '<div class="section-label">Respaldo</div>';
    html += '<button class="btn-outline" id="export-btn">⬇ Exportar datos (JSON)</button>';
    html += '<label class="file-label"><span class="btn-outline" style="display:block;">⬆ Importar datos (JSON)</span>' +
      '<input type="file" id="import-file" accept="application/json"></label>';

    html += '</main>';
    app.innerHTML = html;
    wireSettingsEvents();
  }

  function saveRoutine() { save(ROUTINE_KEY, routine); }

  function wireSettingsEvents() {
    app.querySelectorAll(".settings-day").forEach(function (block) {
      var dayId = block.getAttribute("data-day");
      var day = routine.filter(function (d) { return d.id === dayId; })[0];

      block.querySelectorAll(".ex-row input").forEach(function (inp) {
        inp.addEventListener("change", function () {
          var row = inp.closest(".ex-row");
          var idx = parseInt(row.getAttribute("data-idx"), 10);
          var field = inp.getAttribute("data-f");
          var ex = day.exercises[idx];
          if (field === "sets") ex.sets = Math.max(1, parseInt(inp.value, 10) || 1);
          else if (field === "rest") ex.rest = Math.max(0, parseInt(inp.value, 10) || 0);
          else ex[field] = inp.value;
          saveRoutine();
        });
      });

      block.querySelectorAll(".del").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var idx = parseInt(btn.getAttribute("data-idx"), 10);
          day.exercises.splice(idx, 1);
          saveRoutine();
          renderSettings();
        });
      });
    });

    app.querySelectorAll(".ex-add").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var day = routine.filter(function (d) { return d.id === btn.getAttribute("data-day"); })[0];
        day.exercises.push({ n: "Nuevo ejercicio", sets: 3, label: "3×10", target: 10, rest: 75 });
        saveRoutine();
        renderSettings();
      });
    });

    document.getElementById("restore-btn").addEventListener("click", function () {
      if (!confirm("Esto reemplaza tu rutina personalizada por la original de 4 días. ¿Continuar?")) return;
      routine = JSON.parse(JSON.stringify(DEFAULT_ROUTINE));
      saveRoutine();
      renderSettings();
      toast("Rutina restaurada");
    });

    document.getElementById("export-btn").addEventListener("click", function () {
      var payload = { routine: routine, log: log, notes: notes, lastDay: lastDay, exportedAt: new Date().toISOString() };
      var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "ph-power-backup-" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast("Respaldo descargado");
    });

    document.getElementById("import-file").addEventListener("change", function (e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        try {
          var data = JSON.parse(reader.result);
          if (data.routine) routine = data.routine;
          if (data.log) log = data.log;
          if (data.notes) notes = data.notes;
          if (data.lastDay) lastDay = data.lastDay;
          saveRoutine();
          save(STORE_KEY, log);
          save(NOTES_KEY, notes);
          save(LASTDAY_KEY, lastDay);
          suggestedId = suggestedDayId();
          toast("Datos importados");
          renderSettings();
        } catch (err) {
          toast("Archivo inválido");
        }
      };
      reader.readAsText(file);
    });
  }

  document.getElementById("nav-train").addEventListener("click", function () {
    setView("train");
  });
  document.getElementById("nav-progress").addEventListener("click", function () {
    setView("progress");
  });
  document.getElementById("nav-settings").addEventListener("click", function () {
    setView("settings");
  });

  function setView(v) {
    activeView = v;
    ["train", "progress", "settings"].forEach(function (name) {
      document.getElementById("nav-" + name).classList.toggle("active", name === v);
    });
    render();
  }

  render();
})();
</script>
